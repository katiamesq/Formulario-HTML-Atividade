<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Bônus</title>
</head>
<body style="background-color: blanchedalmond;">
    <header style="background-color: rgb(251, 163, 100); padding: 2px;">
        <h1>Formulário</h1>
    </header>
    
</body>

<form action="/enviar" method="get">

 <fieldset>
    <legend>Dados pessoais</legend>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome"><br>
    <label for="endereco">Endereço:</label>
    <input type="text" id="endereco" name="endereco"><br>
    <label for="cidade">Cidade:</label>
    <input type="text" id="cidade" name="cidade"><br>
    <label for="estado">Estado:</label>
    <select name="opcao" id="estado">
        <option value="nenhum" selected disable>Selecione seu Estado</option>
        <option value="SP">São Paulo</option>
        <option value="RJ">Rio de Janeiro</option>
        <option value="PB">Paraíba</option>
        <option value="PE">Pernambuco</option>
        <option value="CE">Ceará</option>
    </select>
    </fieldset>

<fieldset>
    <legend>Dados profissionais</legend>

    <label for="tipo">Natureza do cargo</label><br>
        <input type="radio" id="tipo" name="grupo" value="gerencia">
        <label for="A">Gerência</label>
        <input type="radio" id="tipo" name="grupo" value="financeiro">
        <label for="B">Financeiro</label>
        <input type="radio" id="tipo" name="grupo" value="recepcao">
        <label for="C">Recepção</label>
        <input type="radio" id="tipo" name="grupo" value="administrativo">
        <label for="D">Administrativo</label>
        <input type="radio" id="tipo" name="grupo" value="juridico">
        <label for="E">Jurídico</label> <br><br>

    <label for="tipo">Área de interesse</label><br>
        <input type="checkbox" id="tipo" name="area" value="computacao">
        <label for="comp">Computação</label>
        <input type="checkbox" id="tipo" name="area" value="biologia">
        <label for="bio">Biologia</label>
        <input type="checkbox" id="tipo" name="area" value="meio ambiente">
        <label for="amb">Meio ambiente</label>
        <input type="checkbox" id="tipo" name="area" value="engenharia">
        <label for="eng">Engenharia</label>
        <input type="checkbox" id="tipo" name="area" value="história">
        <label for="hist">História</label><br><br>

    <label for="curriculo">Mini-curriculo:</label>
        <textarea id="curriculo" name="curriculo" rows="10" cols="50" placeholder="Escreva aqui..."></textarea><br>
</fieldset><br>
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">
</form>

</html>
